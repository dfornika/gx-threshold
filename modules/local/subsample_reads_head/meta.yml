name: "subsample_reads_head"
description: Take the first N records of a read file (or pair) - a fast, dependency-free way to cap alignment cost for a coarse yes/no check that doesn't need a full random subsample
keywords:
  - subsample
  - fastq

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information. Must include `id` and `single_end`.
    - reads:
        type: file
        description: Input FastQ file(s) (single-end or paired-end)
        pattern: "*.{fastq,fq}.gz"
  - - max_reads:
        type: integer
        description: Number of records to keep from the start of the file(s)

output:
  - reads:
      - meta:
          type: map
          description: Groovy Map containing sample information
      - "*.sub.fastq.gz":
          type: file
          description: First `max_reads` records (both mates, for paired-end)
          pattern: "*.sub.fastq.gz"

authors:
  - "@dfornika"
maintainers:
  - "@dfornika"
